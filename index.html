    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-bg-hover: rgba(255, 255, 255, 0.06);
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --text-primary: #ededed;
            --text-secondary: #a1a1aa;
            --border-color: rgba(255, 255, 255, 0.12);
            --border-hover: rgba(255, 255, 255, 0.25);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;
            --glass-blur: blur(24px);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --bg-gradient: radial-gradient(circle at top right, rgba(30, 41, 59, 0.3), transparent 40%),
                radial-gradient(circle at bottom left, rgba(15, 23, 42, 0.3), transparent 40%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            height: 64px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .config-selector {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            min-width: 150px;
            position: relative;
            height: 32px;
        }

        .config-selector:hover {
            border-color: var(--border-hover);
            background: var(--panel-bg-hover);
        }

        .config-selector select {
            appearance: none;
            background: transparent;
            border: none;
            color: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            outline: none;
            padding: 0 28px 0 12px;
        }

        .config-selector .chevron-icon {
            position: absolute;
            right: 8px;
            pointer-events: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            height: 100%;
        }

        .config-selector select option {
            background-color: #111;
            color: #fff;
        }

        .btn {
            height: 32px;
            padding: 0 14px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: none;
            color: inherit;
            white-space: nowrap;
            user-select: none;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #e5e5e5;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--panel-bg-hover);
            border-color: var(--border-hover);
            color: #fff;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 48px 32px;
            flex: 1;
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            color: #fff;
        }

        .provider-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            padding: 24px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.4s ease-out backwards;
            animation-delay: calc(var(--i, 0) * 0.05s);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h3 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0;
            color: #fff;
        }

        .info-row {

            align-items: center;

            border: 1px solid rgba(255, 255, 255, 0.05);

            font-weight: 700;

        .status-badge {

            font-size: 0.75rem;
            border-radius: 99px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;

        }

        .status-badge.success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge.error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            display: inline-flex;
        }

        .icon-btn:hover {
            color: #fff;
            background: var(--panel-bg-hover);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        .modal {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 480px;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .loading-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-color);
        }

        .protocol-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            padding: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            nav {
                padding: 0 16px;
            }

            nav .btn span {
                display: none;
            }
        }
    </style>
</head>

        // 改进的图标组件，避免 DOM 冲突
        const Icon = ({ name, size = 16, className = "", style = {}, ...props }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                let isMounted = true;
                const renderIcon = () => {
                    if (window.lucide && name && isMounted) {
                        const pascalName = name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
                        const iconNode = lucide.icons[pascalName] || lucide.icons[name];
                        if (iconNode) {
                            const isFullNode = typeof iconNode[0] === 'string';
                            const childrenArray = isFullNode ? (iconNode[2] || []) : iconNode;
                            const defaultAttrs = {
                                xmlns: "http://www.w3.org/2000/svg",
                                width: size,
                                height: size,
                                viewBox: "0 0 24 24",
                                fill: "none",
                                stroke: "currentColor",
                                strokeWidth: "2",
                                strokeLinecap: "round",
                                strokeLinejoin: "round",
                                class: `lucide lucide-${name} ${className}`
                            };
                            const finalAttrs = isFullNode ? { ...defaultAttrs, ...iconNode[1] } : defaultAttrs;

                            const childrenString = childrenArray.map(child => {
                                const targetTag = child[0];
                                const cAttrsStr = Object.entries(child[1] || {}).map(([k, v]) => `${k}="${v}"`).join(' ');
                                return `<${targetTag} ${cAttrsStr}></${targetTag}>`;
                            }).join('');

                            const attrsStr = Object.entries(finalAttrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                            setSvg(`<svg ${attrsStr}>${childrenString}</svg>`);
                        } else {
                            // 彻底移除回退字母显示
                            setSvg('');
                        }
                    }
                };

                if (!window.lucide) {
                    const timer = setInterval(() => {
                        if (window.lucide) {
                            renderIcon();
                            clearInterval(timer);
                        }
                    }, 50);
                    return () => { isMounted = false; clearInterval(timer); };
                } else {
                    renderIcon();
                    return () => { isMounted = false; };
                }
            }, [name, size, className]);

            if (!svg) {
                return null;
            }

            return (
                <span
                    style={{
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        lineHeight: 0,
                        flexShrink: 0,
                        width: size,
                        height: size,
                        verticalAlign: 'middle',
                        ...style
                    }}
                    dangerouslySetInnerHTML={{ __html: svg }}
                    {...props}
                />
            );
        };

        const App = () => {
            const [language, setLanguage] = useState(() => localStorage.getItem('model_radar_lang') || 'en');
            const [providers, setProviders] = useState({});

            const t = (key, params = {}) => {
                const langResources = translations[language] || translations['en'];
                let text = langResources[key] || translations['en'][key] || key;
                Object.entries(params).forEach(([k, v]) => {
                    text = text.replace(`{${k}}`, v);
                });
                return text;
            };

            const toggleLanguage = () => {
                const nextLang = language === 'en' ? 'zh' : 'en';
                setLanguage(nextLang);
                localStorage.setItem('model_radar_lang', nextLang);
                document.documentElement.lang = nextLang;
            };

            useEffect(() => {
                document.documentElement.lang = language;
            }, [language]);

            const [statusMap, setStatusMap] = useState({});

            const [loading, setLoading] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [testing, setTesting] = useState(false);
            const [testingProvider, setTestingProvider] = useState(null);
            const [formData, setFormData] = useState({ name: '', baseUrl: '', apiKey: '', model: '' });
            const [isEditMode, setIsEditMode] = useState(false);
            const [addMode, setAddMode] = useState('form'); // 'form' | 'json'
            const [jsonCode, setJsonCode] = useState('');
            const [selectedError, setSelectedError] = useState(null);
            const [configs, setConfigs] = useState({});
            const [currentConfigName, setCurrentConfigName] = useState('Default Config');
            const [pasteText, setPasteText] = useState('');
            const [isDirty, setIsDirty] = useState(false);

            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', options: [] });
            const [promptModal, setPromptModal] = useState({ isOpen: false, title: '', placeholder: '', onConfirm: null });
            const [promptInputValue, setPromptInputValue] = useState('');

            const isLocalFile = window.location.protocol === 'file:';

            useEffect(() => {
                fetchProviders();
            }, []);

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (isDirty) {
                        e.preventDefault();
                        const msg = t('unsaved_alert');
                        e.returnValue = msg;
                        return msg;
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [isDirty, language]);

            useEffect(() => {
                const cfg = configs[currentConfigName];
                if (cfg) {
                    setProviders(cfg.models?.providers || {});
                }
            }, [currentConfigName, configs]);

            const fetchProviders = async () => {
                if (isLocalFile) {
                    setLoading(false);
                    return;
                }
                try {
                    const listResp = await fetch(`${API_BASE}/config/list`);
                    const configList = await listResp.json();

                    const storedCurrent = localStorage.getItem('llm_radar_current_config');
                    const initialName = (storedCurrent && configList.includes(storedCurrent)) ? storedCurrent : (configList[0] || 'Default Config');
                    setCurrentConfigName(initialName);

                    const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(initialName)}`);
                    const data = await resp.json();

                    const normalizeConfig = (cfg) => {
                        let result = { ...cfg };
                        if (!result.models) result.models = { providers: {} };
                        if (!result.models.providers && result.providers) {
                            result.models.providers = result.providers;
                        }
                        if (!result.agents) result.agents = { defaults: { model: { primary: "" } } };
                        if (!result.agents.defaults) result.agents.defaults = { model: { primary: "" } };
                        if (!result.agents.defaults.model) result.agents.defaults.model = { primary: "" };
                        return result;
                    };

                    const normalizedData = normalizeConfig(data);

                    setConfigs(prev => {
                        const newMap = { ...prev };
                        configList.forEach(name => {
                            newMap[name] = name === initialName ? normalizedData : (prev[name] ? normalizeConfig(prev[name]) : null);
                        });
                        return newMap;
                    });
                    setProviders(normalizedData.models?.providers || {});
                    localStorage.setItem('llm_radar_current_config', initialName);
                } catch (err) {
                    console.error('Fetch error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const saveConfigToLocalState = (newProviders) => {
                setConfigs(prev => {
                    const activeConfig = prev[currentConfigName] || { models: { providers: {} } };
                    const updatedConfig = { ...activeConfig, models: { ...activeConfig.models, providers: newProviders } };
                    return { ...prev, [currentConfigName]: updatedConfig };
                });
                setProviders(newProviders);
                setIsDirty(true);
            };

            const handleManualSave = async () => {
                const activeData = configs[currentConfigName];
                if (!activeData) return false;
                try {
                    const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(currentConfigName)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(activeData)
                    });
                    const result = await resp.json();
                    if (result.status === 'success') {
                        setIsDirty(false);
                        alert(t('save_success', { name: currentConfigName }));
                        return true;
                    }
                    throw new Error(result.error);
                } catch (err) {
                    alert(t('save_failed') + err.message);
                    return false;
                }
            };

            const switchToConfig = async (name) => {
                if (name === currentConfigName) return;
                const doSwitch = async () => {
                    try {
                        setLoading(true);
                        const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(name)}`);
                        const data = await resp.json();
                        setConfigs(prev => ({ ...prev, [name]: data }));
                        setCurrentConfigName(name);
                        setIsDirty(false);
                        localStorage.setItem('llm_radar_current_config', name);
                    } catch (err) {
                        alert(t('switch_failed'));
                    } finally {
                        setLoading(false);
                    }
                };
                if (isDirty) {
                    setConfirmModal({
                        isOpen: true,
                        title: t('switch_confirm_title'),
                        message: t('switch_confirm_msg', { name: currentConfigName }),
                        options: [
                            { label: t('save_and_switch'), type: 'primary', onClick: async () => { if (await handleManualSave()) doSwitch(); } },
                            { label: t('discard_and_switch'), type: 'danger', onClick: doSwitch },
                            { label: t('cancel_btn'), type: 'outline', onClick: () => { } }
                        ]
                    });
                    return;
                }
                doSwitch();
            };

            const getUniqueConfigName = (baseName) => {
                let name = baseName;
                let counter = 1;
                const existingNames = Object.keys(configs);
                while (existingNames.includes(name)) {
                    name = `${baseName}_${counter}`;
                    counter++;
                }
                return name;
            };

            const handleCreateNew = () => {
                const uniqueName = getUniqueConfigName(language === 'zh' ? '新配置文件' : 'New_Config');
                setPromptInputValue(uniqueName);
                setPromptModal({
                    isOpen: true,
                    title: t('new_config_title'),
                    placeholder: t('new_config_placeholder'),
                    onConfirm: async (name) => {
                        const empty = { models: { providers: {} }, agents: { defaults: { model: { primary: '' } } } };
                        try {
                            const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(name)}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(empty)
                            });
                            if ((await resp.json()).status === 'success') {
                                setConfigs(prev => ({ ...prev, [name]: empty }));
                                setCurrentConfigName(name);
                                setIsDirty(false);
                                alert(t('new_config_success'));
                            }
                        } catch (e) { alert(t('new_config_failed')); }
                    }
                });
            };

            const handleRename = (oldName) => {
                setPromptInputValue(oldName);
                setPromptModal({
                    isOpen: true,
                    title: t('rename_config_title'),
                    placeholder: t('rename_config_placeholder'),
                    onConfirm: async (newName) => {
                        if (newName === oldName) return;
                        const data = configs[oldName];
                        // 实际上后端目前没提供 rename API，我们通过 POST 新的再逻辑删除旧的模拟（或保持同名覆盖）
                        // 这里的简化方案是 POST 新文件
                        try {
                            await fetch(`${API_BASE}/config?config=${encodeURIComponent(newName)}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data)
                            });
                            const nextConfigs = { ...configs, [newName]: data };
                            delete nextConfigs[oldName];
                            setConfigs(nextConfigs);
                            setCurrentConfigName(newName);
                            alert(t('rename_success'));
                        } catch (e) { alert(t('rename_failed')); }
                    }
                });
            };

            const handleDeleteConfig = async () => {
                console.log('handleDeleteConfig clicked, current:', currentConfigName);
                const name = currentConfigName;
                if (Object.keys(configs).length <= 1) {
                    alert(t('last_config_alert'));
                    return;
                }

                setConfirmModal({
                    isOpen: true,
                    title: t('delete_confirm_title'),
                    message: t('delete_confirm_msg', { name }),
                    options: [
                        {
                            label: t('delete_btn'),
                            type: 'danger',
                            onClick: async () => {
                                try {
                                    const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(name)}`, {
                                        method: 'DELETE'
                                    });
                                    const result = await resp.json();
                                    if (result.status === 'success') {
                                        setConfigs(prev => {
                                            const next = { ...prev };
                                            delete next[name];
                                            return next;
                                        });
                                        // 延迟执行切换逻辑，确保 configs 已更新
                                        setTimeout(() => {
                                            const remaining = Object.keys(configs).filter(k => k !== name);
                                            const nextName = remaining[0] || 'Default Config';
                                            setCurrentConfigName(nextName);
                                            setIsDirty(false);
                                            alert(t('delete_success'));
                                        }, 100);
                                    } else {
                                        alert(t('delete_failed') + result.error);
                                    }
                                } catch (e) {
                                    alert(t('delete_failed') + e.message);
                                }
                            }
                        },
                        {
                            label: t('cancel_btn'),
                            type: 'outline',
                            onClick: () => { }
                        }
                    ]
                });
            };

            const exportConfig = () => {
                const data = configs[currentConfigName];
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentConfigName}.json`;
                a.click();
            };

            const runSingleTest = async (name, config, modelId) => {
                const testKey = `${name}_${modelId}`;
                setTestingProvider(testKey);
                try {
                    const testConfig = { ...config, models: [{ id: modelId }] };
                    const resp = await fetch(`${API_BASE}/test/${encodeURIComponent(name)}?config=${encodeURIComponent(currentConfigName)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(testConfig)
                    });
                    const result = await resp.json();
                    setStatusMap(prev => ({ ...prev, [testKey]: result }));
                } catch (err) {
                    setStatusMap(prev => ({ ...prev, [testKey]: { status: 'error', message: err.message } }));
                } finally {
                    setTestingProvider(null);
                }
            };

            const runNodeTests = async (name, config) => {
                setTestingProvider(name);
                const promises = [];
                (config.models || []).forEach(model => {
                    const testKey = `${name}_${model.id}`;
                    setStatusMap(prev => ({ ...prev, [testKey]: null }));
                    const testConfig = { ...config, models: [{ id: model.id }] };
                    const p = fetch(`${API_BASE}/test/${encodeURIComponent(name)}?config=${encodeURIComponent(currentConfigName)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(testConfig)
                    }).then(r => r.json()).then(res => {
                        setStatusMap(prev => ({ ...prev, [testKey]: res }));
                    }).catch(err => {
                        setStatusMap(prev => ({ ...prev, [testKey]: { status: 'error', message: err.message } }));
                    });
                    promises.push(p);
                });
                await Promise.all(promises);
                setTestingProvider(null);
            };

            const runGlobalTest = async () => {
                setTesting(true);
                try {
                    const promises = [];
                    Object.entries(providers).forEach(([name, config]) => {
                        (config.models || []).forEach(model => {
                            const testKey = `${name}_${model.id}`;
                            const testConfig = { ...config, models: [{ id: model.id }] };
                            const p = fetch(`${API_BASE}/test/${encodeURIComponent(name)}?config=${encodeURIComponent(currentConfigName)}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(testConfig)
                            }).then(r => r.json()).then(res => ({ key: testKey, res })).catch(err => ({ key: testKey, res: { status: 'error', message: err.message } }));
                            promises.push(p);
                        });
                    });
                    const resultsArray = await Promise.all(promises);
                    const newMap = {};
                    resultsArray.forEach(r => newMap[r.key] = r.res);
                    setStatusMap(newMap);
                } catch (err) { alert(t('test_failed') || 'Test Failed'); }
                finally { setTesting(false); }
            };

            const setPrimaryModel = (providerName) => {
                setConfigs(prevConfigs => {
                    const activeConfig = prevConfigs[currentConfigName];
                    if (!activeConfig) return prevConfigs;

                    const provider = (activeConfig.models?.providers || {})[providerName];
                    const modelId = provider?.models?.[0]?.id || "default";

                    if (!provider?.models || provider.models.length === 0) {
                        alert(t('no_model_alert'));
                        return prevConfigs;
                    }

                    // 创建深拷贝并更新
                    const updatedConfig = JSON.parse(JSON.stringify(activeConfig));
                    if (!updatedConfig.agents) updatedConfig.agents = { defaults: { model: {} } };
                    if (!updatedConfig.agents.defaults) updatedConfig.agents.defaults = { model: {} };
                    if (!updatedConfig.agents.defaults.model) updatedConfig.agents.defaults.model = {};

                    updatedConfig.agents.defaults.model.primary = `${providerName}/${modelId}`;

                    return { ...prevConfigs, [currentConfigName]: updatedConfig };
                });
                setIsDirty(true);
            };

            const handleAddModel = (e) => {
                e.preventDefault();
                let newProviders = { ...providers };

                if (addMode === 'json') {
                    try {
                        const parsed = JSON.parse(jsonCode);
                        // 支持两种格式: 直接是对象 { name: {...} } 或 数组 [{ name: ... }, ...] 或 单个 Provider 对象 (需手动输名字)
                        // 这里我们约定 JSON 模式下输入的是单一 Provider 的配置，或者是带有名称的对象
                        if (parsed.name && (parsed.baseUrl || parsed.apiKey)) {
                            // Format 1: { name: "xxx", baseUrl: "...", ... }
                            const { name, ...config } = parsed;
                            if (!isEditMode && providers[name]) {
                                alert(t('duplicate_node_name', { name }));
                                return;
                            }
                            newProviders[name] = {
                                ...config,
                                api: config.api || "openai-completions",
                                models: config.models || [{ id: config.model || "default", name: config.model || "default", reasoning: false, input: ["text"], contextWindow: 128000, maxTokens: 8192 }]
                            };
                        } else if (typeof parsed === 'object' && !Array.isArray(parsed)) {
                            // Format 2: use name from form field
                            const name = formData.name || `${language === 'zh' ? '节点_' : 'Node_'}${Date.now().toString().slice(-4)}`;
                            if (!isEditMode && providers[name]) {
                                alert(t('duplicate_node_name', { name }));
                                return;
                            }
                            newProviders[name] = {
                                ...parsed,
                                api: parsed.api || "openai-completions",
                                models: parsed.models || [{ id: parsed.model || "default", name: parsed.model || "default", reasoning: false, input: ["text"], contextWindow: 128000, maxTokens: 8192 }]
                            };
                        } else {
                            throw new Error(t('invalid_json'));
                        }
                    } catch (err) {
                        alert(t('json_parse_failed') + err.message);
                        return;
                    }
                } else {
                    const { name, ...config } = formData;
                    if (!name) { alert(t('node_name_required')); return; }
                    if (!isEditMode && providers[name]) { alert(t('duplicate_node_name', { name })); return; }
                    if (!config.baseUrl) { alert('Please enter a Base URL.'); return; }
                    if (!config.apiKey) { alert('Please enter an API Key.'); return; }
                    if (!config.model) { alert('Please enter a Default Model ID.'); return; }
                    newProviders[name] = {
                        baseUrl: config.baseUrl,
                        apiKey: config.apiKey,
                        api: "openai-completions",
                        models: [{ id: config.model, name: config.model, reasoning: false, input: ["text"], contextWindow: 128000, maxTokens: 8192 }]
                    };
                }

                saveConfigToLocalState(newProviders);
                setShowAddModal(false);
                setFormData({ name: '', baseUrl: '', apiKey: '', model: '' });
                setJsonCode('');
                setIsEditMode(false);
            };

            const handleEdit = (name, config) => {
                setFormData({
                    name: name,
                    baseUrl: config.baseUrl,
                    apiKey: config.apiKey,
                    model: config.models?.[0]?.id || ''
                });
                setJsonCode(JSON.stringify(config, null, 2));
                setAddMode('form');
                setIsEditMode(true);
                setShowAddModal(true);
            };

            const processImport = (json, defaultName) => {
                setShowImportModal(false);
                setPasteText('');
                const uniqueName = getUniqueConfigName(defaultName || 'Imported Config');
                setPromptInputValue(uniqueName);
                setPromptModal({
                    isOpen: true,
                    title: t('import_title'),
                    placeholder: t('new_config_placeholder'),
                    onConfirm: async (name) => {
                        if (!name) return;
                        if (isLocalFile) {
                            setConfigs(prev => ({ ...prev, [name]: json }));
                            setCurrentConfigName(name);
                            setIsDirty(true);
                            return;
                        }
                        try {
                            const resp = await fetch(`${API_BASE}/config?config=${encodeURIComponent(name)}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(json)
                            });
                            const result = await resp.json();
                            if (result.status === 'success') {
                                setConfigs(prev => ({ ...prev, [name]: json }));
                                setCurrentConfigName(name);
                                setIsDirty(false);
                            } else {
                                throw new Error(result.error || 'Unknown save error');
                            }
                        } catch (e) {
                            alert(t('save_failed') + e.message);
                        }
                    }
                });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if (!json.models) throw new Error("Invalid config format");
                        const defaultName = file.name.replace('.json', '');
                        processImport(json, defaultName);
                    } catch (err) {
                        alert(t('parse_config_failed') + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const maskApiKey = (key) => {
                if (!key) return '';
                if (key.length <= 8) return '****';
                return `${key.slice(0, 4)}****${key.slice(-4)}`;
            };

            if (loading) return (
                <div className="loading-screen">
                    <Icon name="refresh-cw" size={40} className="spin" style={{ stroke: 'var(--accent-color)' }} />
                    {t('connect_service')}
                </div>
            );

            return (
                <div className="container">
                    {isLocalFile && (
                        <div className="protocol-warning">
                            {t('local_file_warning')}
                        </div>
                    )}
                    <nav>
                        <div className="logo">
                            <Icon name="database" size={24} style={{ marginRight: 10, stroke: 'var(--accent-color)' }} />
                            <span style={{ fontWeight: 700, fontSize: '1.15rem', letterSpacing: '-0.02em', color: '#fff' }}>OAAI Model-Radar</span>
                            <span style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', marginLeft: '12px', fontWeight: 500, alignSelf: 'flex-end', paddingBottom: '2px' }}>
                                {language === 'zh' ? '由 OAAI.xyz 出品' : 'by OAAI.xyz'}
                            </span>
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <button className="btn btn-outline" onClick={toggleLanguage} title={language === 'zh' ? 'Switch to English' : '切换为中文'} style={{ width: 44, padding: 0 }}>
                                <Icon name="languages" size={16} />
                                <span style={{ fontSize: '0.7rem', fontWeight: 800, marginLeft: 2 }}>{language === 'zh' ? 'EN' : 'ZH'}</span>
                            </button>

                            <div className="config-selector" title={t('select_config')}>
                                <select value={currentConfigName} onChange={(e) => switchToConfig(e.target.value)}>
                                    {Object.keys(configs).map(name => <option key={name} value={name}>{name}</option>)}
                                </select>
                                <div className="chevron-icon">
                                    <Icon name="chevron-down" size={14} />
                                </div>
                            </div>

                            <button className="btn btn-outline" onClick={handleCreateNew} title={t('new_btn')}><Icon name="file-plus" size={14} /><span>{t('new_btn')}</span></button>
                            <button className="btn btn-outline" onClick={() => handleRename(currentConfigName)} title={t('rename_btn')}><Icon name="edit-3" size={14} /><span>{t('rename_btn')}</span></button>
                            <button className="btn btn-outline" onClick={exportConfig} title={t('export_btn')}><Icon name="download" size={14} /><span>{t('export_btn')}</span></button>
                            <button className="btn btn-outline" onClick={() => setShowImportModal(true)} title={t('import_btn')}><Icon name="upload" size={14} /><span>{t('import_btn')}</span></button>
                            <button className="btn btn-outline" onClick={handleDeleteConfig} title={t('delete_btn')} style={{ color: 'var(--danger)', borderColor: 'hsla(354, 70%, 54%, 0.3)' }}><Icon name="trash-2" size={14} /><span>{t('delete_btn')}</span></button>

                            <div style={{ width: 1, height: 24, background: 'var(--border-color)', margin: '0 8px' }} />

                            <button className="btn btn-outline" onClick={handleManualSave} disabled={!isDirty} style={isDirty ? { borderColor: 'var(--warning)', color: 'var(--warning)' } : {}}><Icon name="save" size={14} /><span>{t('save_btn')}</span></button>
                        </div>
                    </nav>

                    <main>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 30 }}>
                            <div>
                                <h1>{t('page_title')}</h1>
                                <p style={{ color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 12 }}>
                                    <span>{t('current_config')}: <span style={{ color: 'var(--accent-color)', fontWeight: 600 }}>{currentConfigName}</span></span>
                                    {configs[currentConfigName]?.agents?.defaults?.model?.primary && (
                                        <>
                                            <div style={{ width: 1, height: 12, background: 'var(--border-color)' }}></div>
                                            <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}>
                                                <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--success)', boxShadow: '0 0 8px var(--success)' }}></div>
                                                {t('primary_model')}: <code style={{ background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4, color: 'var(--accent-color)' }}>{configs[currentConfigName].agents.defaults.model.primary}</code>
                                            </span>
                                        </>
                                    )}
                                    {isDirty && <span style={{ marginLeft: 'auto', color: 'var(--warning)', fontSize: '0.75rem', display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="alert-circle" size={12} />{t('unsaved_changes')}</span>}
                                </p>
                            </div>
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button className="btn btn-outline" onClick={() => {
                                    setIsEditMode(false);
                                    setFormData({ name: '', baseUrl: '', apiKey: '', model: '' });
                                    setJsonCode('');
                                    setAddMode('form');
                                    setShowAddModal(true);
                                }}><Icon name="plus" size={16} /><span>{t('add_node_btn')}</span></button>
                                <button className="btn btn-outline" onClick={runGlobalTest} disabled={testing}><Icon name={testing ? "refresh-cw" : "activity"} size={16} className={testing ? "spin" : ""} /><span>{t('test_all_btn')}</span></button>
                            </div>
                        </div>

                        <div className="provider-grid">
                            {(() => {
                                let __foundPrimary = false;
                                return Object.entries(providers).map(([name, config], idx) => {
                                    const activeConfig = configs[currentConfigName];
                                    const rawPrimary = activeConfig?.agents?.defaults?.model?.primary;
                                    const modelId = config.models?.[0]?.id;

                                    let isPrimary = false;
                                    if (rawPrimary) {
                                        const expectedStandard = `${name}/${modelId}`;
                                        // 更加精准且健壮的判定
                                        if (
                                            rawPrimary === expectedStandard ||
                                            rawPrimary === name ||
                                            (modelId && rawPrimary === modelId) ||
                                            (rawPrimary.startsWith(name + '/') && (config.models || []).some(m => rawPrimary === `${name}/${m.id}`))
                                        ) {
                                            isPrimary = true;
                                        }
                                    }

                                    return (
                                        <div key={name} className="card" style={{ '--i': idx }}>
                                            <div className="card-header">
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
                                                    <h3>{name}</h3>
                                                </div>
                                                <div style={{ display: 'flex', gap: '8px' }}>
                                                    <button className="btn btn-outline" title={t('copy_btn')} onClick={() => {
                                                        const jsonStr = JSON.stringify({ name, ...config }, null, 2);
                                                        navigator.clipboard.writeText(jsonStr).then(() => alert(t('json_copied'))).catch(err => alert(t('copy_failed') + err));
                                                    }}><Icon name="copy" size={14} /><span>{t('copy_btn')}</span></button>
                                                    <button className="btn btn-outline" title={t('edit_btn')} onClick={() => handleEdit(name, config)}><Icon name="edit" size={14} /><span>{t('edit_btn')}</span></button>
                                                    <button className="btn btn-outline delete" style={{ borderColor: 'var(--danger-bg)', color: 'var(--danger)' }} title={t('delete_btn')} onClick={() => {
                                                        if (confirm(t('delete_node_confirm', { name }))) {
                                                            const newP = { ...providers }; delete newP[name]; saveConfigToLocalState(newP);
                                                        }
                                                    }}>
                                                        <Icon name="trash-2" size={14} /><span>{t('delete_btn')}</span>
                                                    </button>
                                                </div>
                                            </div>
                                            <div style={{ flex: 1 }}>
                                                <div className="info-row" title={t('api_type')}>
                                                    <Icon name="box" size={12} /> <code>{config.api || 'openai-completions'}</code>
                                                </div>
                                                <div className="info-row" title={t('api_url')}>
                                                    <Icon name="globe" size={12} /> <span>{config.baseUrl}</span>
                                                </div>
                                                <div className="info-row" title={t('api_key')}>
                                                    <Icon name="shield" size={12} /> <code>{maskApiKey(config.apiKey)}</code>
                                                </div>
                                                <div className="info-row" title={t('model_list')} style={{ alignItems: 'flex-start' }}>
                                                    <Icon name="layers" size={12} style={{ marginTop: '4px' }} />
                                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', flex: 1 }}>
                                                        {(config.models || []).map(m => {
                                                            const testKey = `${name}_${m.id}`;
                                                            const status = statusMap[testKey];
                                                            return (
                                                                <div key={m.id} style={{ display: 'flex', alignItems: 'center', background: 'rgba(255,255,255,0.05)', borderRadius: '6px', overflow: 'hidden', border: '1px solid var(--border-color)' }}>
                                                                    <div style={{ padding: '2px 8px', fontSize: '0.8rem', color: '#d1d5db' }}>{m.id}</div>
                                                                    <button
                                                                        className="btn"
                                                                        style={{ padding: '0 6px', height: '100%', borderLeft: '1px solid var(--border-color)', borderBottom: 'none', borderTop: 'none', borderRight: 'none', borderRadius: 0, minHeight: '24px' }}
                                                                        onClick={() => runSingleTest(name, config, m.id)}
                                                                        disabled={testingProvider === testKey}
                                                                        title={t('test_btn')}
                                                                    >
                                                                        {testingProvider === testKey ? <Icon name="refresh-cw" size={12} className="spin" /> : <Icon name="zap" size={12} />}
                                                                    </button>
                                                                    {status && (
                                                                        <div
                                                                            title={status.status === 'error' ? status.message : t('status_available')}
                                                                            style={{
                                                                                padding: '0 6px', height: '100%', display: 'flex', alignItems: 'center',
                                                                                background: status.status === 'success' ? 'var(--success-bg)' : 'var(--danger-bg)',
                                                                                color: status.status === 'success' ? 'var(--success)' : 'var(--danger)',
                                                                                cursor: status.status === 'error' ? 'pointer' : 'default'
                                                                            }}
                                                                            onClick={() => status.status === 'error' && setSelectedError(status.message)}
                                                                        >
                                                                            <Icon name={status.status === 'success' ? 'check-circle' : 'alert-circle'} size={12} />
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                            <div style={{ marginTop: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
                                                <div style={{ display: 'flex', gap: 8 }}>
                                                    <button
                                                        className={`btn ${isPrimary ? 'btn-primary' : 'btn-outline'}`}
                                                        onClick={() => setPrimaryModel(name)}
                                                        disabled={isPrimary}
                                                    >
                                                        <Icon name="star" size={14} /><span>{isPrimary ? t('primary_model') : t('set_primary')}</span>
                                                    </button>
                                                    <button
                                                        className="btn btn-outline"
                                                        onClick={() => runNodeTests(name, config)}
                                                        disabled={testingProvider === name}
                                                    >
                                                        {testingProvider === name ? <Icon name="refresh-cw" size={14} className="spin" /> : <Icon name="zap" size={14} />}<span>{t('test_all_btn')}</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                });
                            })()}
                            {Object.keys(providers).length === 0 && (
                                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '100px 0', color: 'var(--text-secondary)', border: '2px dashed var(--border-color)', borderRadius: 20 }}>
                                    {t('no_nodes')}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 节点弹窗 */}
                    {showAddModal && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="modal-header">
                                    <h2>{isEditMode ? t('modal_edit_node') : t('modal_add_node')}</h2>
                                    <button className="btn btn-outline" onClick={() => setShowAddModal(false)}><Icon name="x" size={16} /><span>{t('modal_close')}</span></button>
                                </div>

                                {!isEditMode && (
                                    <div style={{ display: 'flex', background: 'hsla(0,0%,0%,0.2)', padding: '4px', borderRadius: '8px', marginBottom: '24px' }}>
                                        <button
                                            className={`btn ${addMode === 'form' ? 'btn-primary' : 'btn-outline'}`}
                                            style={{ flex: 1, border: 'none', boxShadow: addMode === 'form' ? '' : 'none' }}
                                            onClick={() => setAddMode('form')}
                                        >
                                            <Icon name="list" size={14} /><span>{t('mode_form')}</span>
                                        </button>
                                        <button
                                            className={`btn ${addMode === 'json' ? 'btn-primary' : 'btn-outline'}`}
                                            style={{ flex: 1, border: 'none', boxShadow: addMode === 'json' ? '' : 'none' }}
                                            onClick={() => setAddMode('json')}
                                        >
                                            <Icon name="code" size={14} /><span>{t('mode_json')}</span>
                                        </button>
                                    </div>
                                )}

                                <form onSubmit={handleAddModel} noValidate>
                                    {addMode === 'form' ? (
                                        <React.Fragment>
                                            <div className="form-group">
                                                <label>{t('node_name')}</label>
                                                <input value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} required disabled={isEditMode} placeholder="" />
                                            </div>
                                            <div className="form-group">
                                                <label>{t('base_url')}</label>
                                                <input value={formData.baseUrl} onChange={e => setFormData({ ...formData, baseUrl: e.target.value })} required placeholder="" />
                                            </div>
                                            <div className="form-group">
                                                <label>{t('api_key_label')}</label>
                                                <input type="password" value={formData.apiKey} onChange={e => setFormData({ ...formData, apiKey: e.target.value })} required placeholder="" />
                                            </div>
                                            <div className="form-group">
                                                <label>{t('default_model_id')}</label>
                                                <input value={formData.model} onChange={e => setFormData({ ...formData, model: e.target.value })} required placeholder="" />
                                            </div>
                                        </React.Fragment>
                                    ) : (
                                        <div className="form-group">
                                            <label>{t('json_label')}</label>
                                            <textarea
                                                rows="12"
                                                value={jsonCode}
                                                onChange={e => setJsonCode(e.target.value)}
                                                placeholder='{ "name": "MyNode", "baseUrl": "...", "apiKey": "...", "models": [...] }'
                                                style={{ fontFamily: 'monospace', fontSize: '0.85rem' }}
                                                required
                                            ></textarea>
                                            <p style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', marginTop: '8px' }}>
                                                {t('json_tip')}
                                            </p>
                                        </div>
                                    )}
                                    <div style={{ display: 'flex', gap: '10px', marginTop: '30px' }}>
                                        <button type="submit" className="btn btn-primary" style={{ flex: 1 }}>{t('confirm_btn')}</button>
                                        <button type="button" className="btn btn-outline" style={{ flex: 1 }} onClick={() => setShowAddModal(false)}>{t('cancel_btn')}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 导入弹窗 */}
                    {showImportModal && (
                        <div className="modal-overlay">
                            <div className="modal" style={{ maxWidth: 600 }}>
                                <div className="modal-header">
                                    <h2>{t('import_title')}</h2>
                                    <button className="btn btn-outline" onClick={() => setShowImportModal(false)}>
                                        <Icon name="x" size={16} /><span>{t('modal_close')}</span>
                                    </button>
                                </div>
                                <div style={{ marginBottom: '20px' }}>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '16px' }}>{t('import_tip')}</p>

                                    <div style={{ border: '2px dashed var(--border-color)', borderRadius: '8px', padding: '30px', textAlign: 'center', marginBottom: '20px', position: 'relative', background: 'hsla(0,0%,0%,0.2)' }}>
                                        <Icon name="upload-cloud" size={30} style={{ color: 'var(--text-secondary)' }} />
                                        <div style={{ marginTop: '10px', color: 'var(--text-primary)' }}>{t('upload_tip')}</div>
                                        <input type="file" accept=".json" onChange={handleFileUpload} style={{ position: 'absolute', opacity: 0, width: '100%', height: '100%', top: 0, left: 0, cursor: 'pointer' }} />
                                    </div>

                                    <div style={{ margin: '15px 0', display: 'flex', alignItems: 'center', gap: '10px' }}>
                                        <div style={{ flex: 1, height: '1px', background: 'var(--border-color)' }}></div>
                                        <span style={{ color: 'var(--text-secondary)', fontSize: '0.8rem' }}>{t('or_label')}</span>
                                        <div style={{ flex: 1, height: '1px', background: 'var(--border-color)' }}></div>
                                    </div>

                                    <div className="form-group" style={{ marginBottom: '16px' }}>
                                        <textarea
                                            rows="8"
                                            value={pasteText}
                                            onChange={e => setPasteText(e.target.value)}
                                            placeholder={t('paste_placeholder')}
                                            style={{ fontFamily: 'monospace', fontSize: '0.9rem' }}
                                        ></textarea>
                                    </div>
                                    <button className="btn btn-primary" style={{ width: '100%' }} disabled={!pasteText.trim()} onClick={() => {
                                        try {
                                            const json = JSON.parse(pasteText);
                                            if (!json.models) throw new Error(t('invalid_config_format'));
                                            processImport(json, t('import_btn'));
                                        } catch (e) { alert(e.message); }
                                    }}>
                                        <Icon name="check" size={16} /><span>{t('import_submit')}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 错误详情 */}
                    {selectedError && (
                        <div className="modal-overlay" onClick={() => setSelectedError(null)}>
                            <div className="modal" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 style={{ color: 'var(--danger)' }}>{t('error_details')}</h2>
                                    <button className="btn btn-outline" onClick={() => setSelectedError(null)}><Icon name="x" size={14} /><span>{t('modal_close')}</span></button>
                                </div>
                                <div style={{ background: '#000', padding: 20, borderRadius: 8, maxHeight: 300, overflow: 'auto', fontSize: '0.9rem', color: '#ff6b6b', whiteSpace: 'pre-wrap', border: '1px solid var(--border-color)' }}>
                                    {selectedError}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 问题弹窗 (Prompt) */}
                    {promptModal.isOpen && (
                        <div className="modal-overlay">
                            <div className="modal" style={{ maxWidth: 400 }}>
                                <h2>{promptModal.title}</h2>
                                <div className="form-group" style={{ marginTop: 20 }}>
                                    <input
                                        autoFocus
                                        value={promptInputValue}
                                        onChange={e => setPromptInputValue(e.target.value)}
                                        placeholder={promptModal.placeholder}
                                        onKeyDown={e => e.key === 'Enter' && promptInputValue && (promptModal.onConfirm(promptInputValue), setPromptModal({ isOpen: false }))}
                                    />
                                </div>
                                <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end' }}>
                                    <button className="btn btn-outline" onClick={() => setPromptModal({ isOpen: false })}><span>{t('cancel_btn')}</span></button>
                                    <button className="btn btn-primary" disabled={!promptInputValue} onClick={() => { promptModal.onConfirm(promptInputValue); setPromptModal({ isOpen: false }); }}><span>{t('confirm_btn')}</span></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 确认弹窗 */}
                    {confirmModal.isOpen && (
                        <div className="modal-overlay">
                            <div className="modal" style={{ maxWidth: 400 }}>
                                <h2>{confirmModal.title}</h2>
                                <p style={{ margin: '20px 0', color: 'var(--text-secondary)' }}>{confirmModal.message}</p>
                                <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end' }}>
                                    {confirmModal.options.map((opt, i) => (
                                        <button key={i} className={`btn ${opt.type === 'primary' ? 'btn-primary' : (opt.type === 'danger' ? 'btn-outline' : 'btn-outline')}`}
                                            style={opt.type === 'danger' ? { color: 'var(--danger)', borderColor: 'var(--danger)' } : {}}
                                            onClick={() => { setConfirmModal({ isOpen: false }); opt.onClick(); }}>
                                            <span>{opt.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
